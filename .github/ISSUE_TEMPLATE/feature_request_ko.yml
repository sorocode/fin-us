name: "✨ 기능 요청"
description: "새로운 기능이나 아이디어를 제안해 주세요."
title: "[FEAT] "
labels: ["enhancement"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        새로운 아이디어를 제안해 주셔서 감사합니다! 제안하신 기능이 프로젝트에 어떻게 기여할 수 있을지 설명해 주세요.
  - type: textarea
    id: feature-description
    attributes:
      label: "기능 설명"
      description: "제안하고 싶은 기능에 대해 명확하게 설명해 주세요."
      placeholder: "예: 다크 모드 지원 기능을 추가하고 싶습니다."
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: "제안 배경"
      description: "이 기능이 왜 필요한가요? 해결하고자 하는 문제나 이점을 적어주세요."
      placeholder: "예: 야간 사용 시 눈의 피로도를 줄이기 위해 필요합니다."
    validations:
      required: true
  - type: textarea
    id: proposed-solution
    attributes:
      label: "해결 방안"
      description: "생각하시는 구현 방법이나 구체적인 동작 방식을 설명해 주세요."
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: "대안 (선택 사항)"
      description: "고려해 보신 다른 대안이 있다면 설명해 주세요."
