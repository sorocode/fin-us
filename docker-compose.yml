services:
  frontend:
    build:
      context: ./frontend-react
    ports:
      - "5173:5173"
    volumes:
      - ./frontend-react:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:8000/api/v1
    depends_on:
      backend:
        condition: service_started
    networks:
      - fin-us-network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - /app/backend/venv
    env_file:
      - ./backend/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NAT_BASE_URL: http://finus-nat:8000
    depends_on:
      finus-nat:
        condition: service_healthy
    networks:
      - fin-us-network

  finus-nat:
    build:
      context: .
      dockerfile: finus_nat/Dockerfile
    ports:
      - "8001:8000"
    env_file:
      - ./backend/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s
    networks:
      - fin-us-network

networks:
  fin-us-network:
    driver: bridge
