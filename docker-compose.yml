# Unity 클라이언트(`frontend/`)는 Docker로 빌드하지 않습니다. 에디터 또는 로컬 빌드로 실행한 뒤
# API Base URL을 맞추세요. Docker 백엔드는 호스트 8787로 노출(컨테이너 내부 8000) — Unity 기본값과 동일.

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8787:8000"
    volumes:
      - .:/app
      - /app/backend/venv
    env_file:
      - ./backend/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NAT_BASE_URL: http://finus-nat:8000
    depends_on:
      finus-nat:
        condition: service_healthy
    networks:
      - fin-us-network

  finus-nat:
    build:
      context: .
      dockerfile: finus_nat/Dockerfile
    ports:
      - "8001:8000"
    env_file:
      - ./backend/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      MEM0_API_KEY: selfhost-mem0-static-key
      FINUS_MEM0_HOST: http://host.docker.internal:8888
      FINUS_MEM0_ORG_ID: selfhost-org
      FINUS_MEM0_PROJECT_ID: selfhost-project
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s
    networks:
      - fin-us-network

networks:
  fin-us-network:
    driver: bridge
