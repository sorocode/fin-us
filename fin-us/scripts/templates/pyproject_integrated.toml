# 한글: 실행은 Docker(`fin-us/backend/Dockerfile`의 `uv sync`)만 사용합니다. 호스트 `uv`는 불필요합니다.
#      저장소 루트의 uvicorn으로 `main.py`를 띄우면 ModuleNotFoundError: mcp 가 납니다.

[project]
name = "fin-us-backend-integrate"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.32.0",
    "pydantic>=2.0",
    "python-dotenv>=1.0",
    "mcp>=1.0",
    "pyyaml>=6.0",
    "httpx>=0.27",
]
