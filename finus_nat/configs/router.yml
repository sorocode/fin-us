base: agents/diary_agent.yml

llms:
  # Optional router-specific OpenAI model config (uncomment when needed).
  router_openai_llm:
    _type: openai
    api_key: ${OPENAI_API_KEY}
    base_url: ${OPENAI_API_BASE_URL:-${OPENAI_BASE_URL:-https://api.openai.com/v1}}
    model_name: ${ROUTER_OPENAI_CHAT_MODEL:-gpt-5.4-mini}

# Supervisor는 ChatRequest.messages 전체를 유지한 채 가장 적합한 하위 에이전트로 라우팅합니다.
workflow:
  _type: finus_supervisor_agent
  llm_name: router_openai_llm
  max_history_messages: 12
  branches:
    - name: trading_agent
      function_name: trading_agent
      description: "트레이딩, 주문, 체결, 보유, 주식 시세"
    - name: monitoring_agent
      function_name: monitoring_agent
      description: "모니터링, 리스크, 알림, 포트폴리오 건전성, 하락"
    - name: news_agent
      function_name: news_agent
      description: "뉴스, 헤드라인, 거시경제, 공시, 이벤트, 리서치"
    - name: recommend_agent
      function_name: recommend_agent
      description: "종목 추천, 무엇을 사야 하는지"
    - name: strategy_agent
      function_name: strategy_agent
      description: "전략, 규칙, 백테스트, 배분, 신호"
    - name: diary_agent
      function_name: diary_agent
      description: "일기, 메모, 거래 로깅, 매매일지"
