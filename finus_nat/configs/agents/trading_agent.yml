base: ../common.yml

llms:
  trading_openai_llm:
    _type: openai
    api_key: ${OPENAI_API_KEY}
    base_url: ${OPENAI_API_BASE_URL:-${OPENAI_BASE_URL:-https://api.openai.com/v1}}
    model_name: ${TRADING_OPENAI_CHAT_MODEL:-gpt-5.4-mini}


memory:
  mem0_memory:
    _type: mem0_memory
    host: ${FINUS_MEM0_HOST:-http://localhost:8888}
    org_id: ${FINUS_MEM0_ORG_ID:-selfhost-org}
    project_id: ${FINUS_MEM0_PROJECT_ID:-selfhost-project}
    # API credentials are loaded from environment variables: MEM0_API_KEY

functions:
  kis-trading-mcp-tool:
    _type: finus_account_balance
    mcp_transport: sse
    mcp_url: ${FINUS_KIS_TRADING_MCP_URL:-http://kis-trading-mcp:3000/sse}
    trading_tool_name: ${FINUS_KIS_TRADING_TOOL_NAME:-domestic_stock}

  trading_agent_react:
    _type: react_agent
    llm_name: trading_openai_llm
    tool_names:
      - kis-trading-mcp-tool
    verbose: true
    include_tool_input_schema_in_tool_description: true
    use_native_tool_calling: false
    max_history: 8000
    parse_agent_response_max_retries: 5
    raise_on_parsing_failure: false
    max_tool_calls: 25
    pass_tool_call_errors_to_agent: true
    accept_direct_answer_without_react_format: false
    additional_instructions: |
      주식 주문과 주식 시세를 조회하는 에이전트 입니다.
      Fin-Us MCP 도구로 계좌·뉴스·수급·리서치를 조회하고, 리스크를 고려한 매매 관점(BUY/SELL/HOLD)과 배분 아이디어를 제안합니다.

      === 동작 지시 ===
      - 한국투자 [Kis Trading MCP](https://github.com/koreainvestment/open-trading-api/tree/main/MCP/Kis%20Trading%20MCP)와 동일: `domestic_stock`에 `api_type`·`params` JSON 한 줄. 잔고는 api_type `inquire_balance`, params는 비워도 됨(NAT가 필수 키 보정).
      - 도구가 오류 JSON을 반환하면 내용을 사용자에게 설명하고, 가능하면 다른 도구로 보완하십시오.
      - 최종 답변은 조회 결과가 드러나는 한국어 문장으로 마무리하십시오.

  trading_agent:
    _type: auto_memory_agent
    inner_agent_name: trading_agent_react
    memory_name: mem0_memory
    llm_name: trading_openai_llm
    verbose: true
    description: "KIS MCP를 사용하여 거래를 구현합니다"

  trading_branch_agent:
    _type: fe_branch
    inner_function_name: trading_agent
    tool_description: "Trading: account balance via Kis Trading MCP (Docker SSE); news/flows/research via Fin-Us stdio MCP."
