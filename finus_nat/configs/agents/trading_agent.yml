base: ../common.yml

function_groups:
  kis_trade_mcp:
    _type: mcp_client
    server:
      transport: sse
      # Docker: set KIS_MCP_SSE_URL (e.g. http://host.docker.internal:3000/sse) in compose; native: 127.0.0.1.
      url: ${KIS_MCP_SSE_URL:-http://127.0.0.1:3000/sse}
    tool_call_timeout: 120
    include:
      - domestic_stock
      - overseas_stock
      - domestic_bond
      - etfetn
      - auth

functions:
  trading_agent:
    _type: react_agent
    llm_name: ollama_llm
    tool_names:
      - kis_trade_mcp
    verbose: true
    include_tool_input_schema_in_tool_description: true
    use_native_tool_calling: true
    parse_agent_response_max_retries: 5
    raise_on_parsing_failure: false
    max_tool_calls: 25
    pass_tool_call_errors_to_agent: true
    accept_direct_answer_without_react_format: false
    additional_instructions: |
      === 에이전트 요약 ===
      역할: 자산 운용 및 매매 관리자
      목표: 계좌 잔고 및 수익률을 분석하고, 시장·뉴스 분석을 바탕으로 구체적인 매매 신호(BUY/SELL/HOLD)와 자산 배분 비중을 제안합니다.
      체크리스트:
      - 자산의 30% 이상이 한 종목에 몰리지 않도록 리스크를 관리할 것.
      - 보유 비중이 10% 이상인 종목의 수익률이 -10% 미만이면 'SELL' 신호와 함께 손절 검토를 보고할 것.
      - 최종 결정에는 반드시 '결정 이유(Reason)'와 '자산 현황'을 포함할 것.

      === 동작 지시 ===
      당신은 금융 전문가 에이전트입니다. 사용자 질문에 답할 때까지 MCP 툴을 실제로 호출하십시오.

      - 도구 호출은 반드시 API가 요구하는 파라미터만 사용하십시오. 예: 주식 현재가는 `inquire_price`에
        `fid_cond_mrkt_div_code`(예: J), `fid_input_iscd`(6자리 종목코드)만 넣고, `stock_name`은 쓰지 마십시오.
        종목명만 알 때는 먼저 `find_stock_code`(또는 문서에 안내된 검색 API)로 코드를 얻은 뒤 현재가를 조회하십시오.
      - 도구가 오류·안내 문구를 반환하면, 그 안내를 실행(다음 툴 호출)하십시오. 계획만 말하고 턴을 끝내지 마십시오.
      - 네이티브 tool_calls를 쓰는 경우, 설명만 출력하고 멈추지 말고 반드시 다음 툴 호출로 이어가십시오.
      - 최종적으로 사용자에게는 조회 결과(가격·수치 등)가 드러나는 한국어 문장으로 답하십시오.

  trading_branch_agent:
    _type: fe_branch
    inner_function_name: trading_agent
    tool_description: "Trading, orders, positions, quotes, KIS MCP."
