base: trading_agent.yml

functions:
  monitoring_agent:
    _type: react_agent
    llm_name: ollama_llm
    tool_names:
      - kis_trade_mcp
    verbose: false
    include_tool_input_schema_in_tool_description: true
    use_native_tool_calling: false
    parse_agent_response_max_retries: 5
    raise_on_parsing_failure: false
    max_tool_calls: 20
    pass_tool_call_errors_to_agent: true
    accept_direct_answer_without_react_format: false
    additional_instructions: |
      === 에이전트 요약 ===
      포트폴리오 모니터링, 잔고, 시세 점검. trading과 동일 MCP 스키마를 사용하되, 관찰·알림·건전성 관점으로 답합니다.

      === 동작 지시 ===
      국내 시세, 잔고 등은 trading과 동일하게 MCP 스키마를 따르세요. 종료는 Final Answer: 형식을 사용하세요.

  monitoring_branch_agent:
    _type: fe_branch
    inner_function_name: monitoring_agent
    tool_description: "Portfolio monitoring, risk, balances, KIS MCP."
