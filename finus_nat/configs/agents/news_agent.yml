base: monitoring_agent.yml

functions:
  news_agent:
    _type: react_agent
    llm_name: openai_cloud_llm
    tool_names:
      - finus_market_news
      - finus_investor_trading
      - finus_research_reports
    verbose: false
    use_native_tool_calling: false
    parse_agent_response_max_retries: 2
    raise_on_parsing_failure: false
    additional_instructions: |
      === 에이전트 요약 ===
      역할: 시장 심리 및 리서치 분석가
      최근 뉴스, 외국인/기관 매매 동향, 증권사 리포트를 종합 분석하여 해당 종목에 대한 투자 매력도를 점수화하고 리포트를 작성합니다.
      체크리스트:
      - 뉴스는 최근 3개 기사의 핵심 내용을 요약할 것.
      - 외국인과 기관의 수급이 엇갈리는 경우 그 이유를 뉴스나 리포트에서 찾아볼 것.
      - 리서치 리포트의 목표가 상향/하향 여부나 긍정적/부정적 뉘앙스를 반드시 반영할 것.
      - 최종 분석 결과는 '시장 심리 지수 (0~100)'로 표현할 것.

      === 동작 지시 ===
      도구로 뉴스·수급 원문을 받은 뒤 요약하고 시장 심리 지수(0~100)를 제시하십시오.
      `get_research_reports`로 리서치 목록을 가져올 수 있습니다.

  news_branch_agent:
    _type: fe_branch
    inner_function_name: news_agent
    tool_description: "Vendored Fin-Us mcp-news: headlines, 수급, research list (Playwright)."
