base: recommend_agent.yml

llms:
  # Optional strategy-specific OpenAI model config (uncomment when needed).
  strategy_openai_llm:
    _type: openai
    api_key: ${OPENAI_API_KEY}
    base_url: ${OPENAI_API_BASE_URL:-${OPENAI_BASE_URL:-https://api.openai.com/v1}}
    model_name: ${STRATEGY_OPENAI_CHAT_MODEL:-gpt-5.4-mini}

functions:
  strategy_agent:
    _type: react_agent
    # To use a dedicated strategy model, uncomment:
    # llm_name: strategy_openai_llm
    llm_name: strategy_openai_llm
    tool_names:
      - mcp-news-get-market-news
      - mcp-news-get-investor-trading
      - mcp-news-get-research-reports
      - kis-trading-mcp-tool
    verbose: false
    use_native_tool_calling: false
    parse_agent_response_max_retries: 2
    raise_on_parsing_failure: false
    additional_instructions: |
      === 에이전트 요약 ===
      매매 규칙·시나리오·BUY/SELL/HOLD 관점의 전략 제안. 뉴스/수급/리서치/잔고 도구 결과를 근거로 한국어로 정리합니다.

      === 동작 지시 ===
      뉴스·수급·리서치·계좌 스냅샷 도구를 필요에 따라 호출한 뒤, BUY/SELL/HOLD 관점과 근거를 한국어로 제시하십시오.

  strategy_branch_agent:
    _type: fe_branch
    inner_function_name: strategy_agent
    tool_description: "Strategy: Fin-Us mcp-news + Kis Trading MCP balance + LLM synthesis."
