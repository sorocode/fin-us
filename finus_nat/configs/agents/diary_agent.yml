base: strategy_agent.yml

functions:
  diary_agent:
    _type: react_agent
    llm_name: ollama_llm
    tool_names:
      - fe_stub
    verbose: false
    use_native_tool_calling: false
    parse_agent_response_max_retries: 2
    raise_on_parsing_failure: false
    accept_direct_answer_without_react_format: false
    additional_instructions: |
      === 에이전트 요약 ===
      매매 대한 메모, 복기, 감정 정리을 정리합니다. 외부 데이터 도구 없이 저장된 데이터로 초안을 작성합니다.

      === 동작 지시 ===
      "diary agent를 호출합니다"를 출력합니다.

  diary_branch_agent:
    _type: fe_branch
    inner_function_name: diary_agent
    tool_description: "Trading diary: conversation and reflection (no file journal)."
