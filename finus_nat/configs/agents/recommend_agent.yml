base: news_agent.yml

functions:
  recommend_agent:
    _type: react_agent
    llm_name: openai_cloud_llm
    tool_names:
      - mcp-news-get-market-news
      - mcp-news-get-investor-trading
      - mcp-news-get-research-reports
    verbose: false
    use_native_tool_calling: false
    parse_agent_response_max_retries: 2
    raise_on_parsing_failure: false
    additional_instructions: |
      === 에이전트 요약 ===
      뉴스 브랜치(`news_agent`)와 같은 스타일을 유지하되, 답변은 **권고·아이디어·리스크·촉매·모멘텀** 관점으로 정리하십시오.
      체크리스트(요약): 뉴스 3건 핵심, 수급 엇갈림 이유, 리서치 논조, 시장 심리 지수(0~100)는 필요 시 참고하되 최종은 "권고 관점" 한국어 서술에 맞추십시오.

      === 동작 지시 ===
      도구로 뉴스·수급·리서치 원문을 가져온 뒤, 종목에 대한 권고 관점(리스크·촉매·모멘텀)을 한국어로 정리하십시오.

  recommend_branch_agent:
    _type: fe_branch
    inner_function_name: recommend_agent
    tool_description: "Recommendations: Fin-Us mcp-news (headlines, flows, research) + LLM synthesis."
