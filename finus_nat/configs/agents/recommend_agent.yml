base: news_agent.yml

llms:
  # Optional recommend-specific OpenAI model config (uncomment when needed).
  recommend_openai_llm:
    _type: openai
    api_key: ${OPENAI_API_KEY}
    base_url: ${OPENAI_API_BASE_URL:-${OPENAI_BASE_URL:-https://api.openai.com/v1}}
    model_name: ${RECOMMEND_OPENAI_CHAT_MODEL:-gpt-5.4-mini}

functions:
  recommend_agent:
    _type: react_agent
    # To use a dedicated recommend model, uncomment:
    # llm_name: recommend_openai_llm
    llm_name: recommend_openai_llm
    tool_names:
      - mcp-news-get-market-news
      - mcp-news-get-investor-trading
      - mcp-news-get-research-reports
    verbose: false
    use_native_tool_calling: false
    max_history: 8000
    parse_agent_response_max_retries: 2
    raise_on_parsing_failure: false
    additional_instructions: |
      사용자의 질문에 따라 조건에 맞는 종목을 추천합니다.
      정형적인 데이터에 기반한 조건을 질문할 경우 kis-trading-mcp-tool을 호출합니다.
      비정형적인 데이터에 기반한 조건을 질문할 경우 mcp-news 툴을 호출합니다.
      최대한 조건에 맞는 종목 하나를 사용자에게 추천하고 만약에 찾지 못했다면 유사한 종목도 제시합니다.


  recommend_branch_agent:
    _type: fe_branch
    inner_function_name: recommend_agent
    tool_description: "Recommendations: Fin-Us mcp-news (headlines, flows, research) + LLM synthesis."
