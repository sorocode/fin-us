functions:
  # nat_finus_nat/stub.py — 외부 MCP 없음, 라우터 분기용 플레이스홀더
  fe_stub:
    _type: fe_stub

  # fin-us/mcp-news(stdio Node) →  네이버 종목 뉴스 3건
  mcp-news-get-market-news:
    _type: finus_market_news

  # fin-us/mcp-news(stdio) → get_investor_trading
  mcp-news-get-investor-trading:
    _type: finus_investor_trading

  # fin-us/mcp-news(stdio) → get_research_reports
  mcp-news-get-research-reports:
    _type: finus_research_reports

llms:
  openai_cloud_llm:
    _type: openai
    # Shared key source: fin-us/backend/.env -> OPENAI_API_KEY
    api_key: ${OPENAI_API_KEY}
    base_url: ${OPENAI_API_BASE_URL:-${OPENAI_BASE_URL:-https://api.openai.com/v1}}
    model_name: ${OPENAI_CHAT_MODEL:-gpt-5.4-mini}


  ollama_llm:
    _type: openai
    api_key: ${OLLAMA_API_KEY:-ollama}
    base_url: ${OLLAMA_OPENAI_BASE_URL:-http://127.0.0.1:11434/v1}
    model_name: ""
